<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPSBOT — Coming Soon</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00c032;
    --green-dark: #006618;
    --bg: #020902;
    --surface: #070f07;
    --border: rgba(0,255,65,0.2);
    --text: #b8f5c0;
    --text-dim: #4d8f55;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Orbitron', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body { 
    min-height: 100%; 
    background: var(--bg);
  }

  body {
    color: var(--text);
    font-family: var(--mono);
    overflow-y: auto;
    overflow-x: hidden;
    cursor: crosshair;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* FIX: Anchor to top so it only expands downwards */
    justify-content: flex-start;
    padding-top: 10vh; 
    padding-bottom: 5vh;
  }

  /* SCANLINES & GRID (Fixed to viewport) */
  body::before, body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
  }
  body::before {
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    z-index: 100;
  }
  body::after {
    background-image: linear-gradient(rgba(0,255,65,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 99;
  }

  .bg-glow {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(0,255,65,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 1;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 700px;
    padding: 0 2rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* LOGO */
  .logo {
    font-family: var(--display);
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 0.15em;
    opacity: 0;
    animation: fadein 0.4s 0.2s forwards;
  }
  .logo .bracket { color: var(--green-dim); text-shadow: 0 0 20px rgba(0,200,50,0.4); }
  .logo .ops { color: var(--green); text-shadow: 0 0 30px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2); }
  .logo .bot { color: #fff; }

  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border: 1px solid var(--border);
    padding: 0.3rem 0.9rem;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: var(--green-dim);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadein 0.4s 0.5s forwards;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }

  /* TERMINAL FIXES */
  .terminal {
    width: 100%;
    background: #030d03;
    border: 1px solid var(--border);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadein 0.4s 0.7s forwards;
    display: flex;
    flex-direction: column;
  }
  .terminal-bar {
    background: #080f08;
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .t-dot { width: 9px; height: 9px; border-radius: 50%; }
  .t-r { background: #2a0d0d; }
  .t-y { background: #2a220d; }
  .t-g { background: var(--green-dark); }
  .terminal-title { font-size: 0.65rem; color: var(--text-dim); margin: 0 auto; letter-spacing: 0.1em; }

  .terminal-body {
    padding: 1.2rem 1.4rem;
    font-size: 0.78rem;
    line-height: 2;
    text-align: left;
    /* FIX: Defined height and scrollable */
    height: 250px; 
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dark) transparent;
  }
  .terminal-body::-webkit-scrollbar { width: 4px; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--green-dark); }

  .line { display: flex; gap: 0.6rem; opacity: 0; }
  .line.visible { opacity: 1; }
  .prompt { color: var(--green-dim); flex-shrink: 0; }
  .cmd { color: #fff; }
  .out { color: var(--text-dim); padding-left: 1.2rem; }
  .out.green { color: var(--green); }
  .out.warn { color: #e07b30; }
  .out.dim { color: var(--green-dark); }
  .cursor-line { display: flex; gap: 0.6rem; }
  .cursor { display: inline-block; width: 8px; height: 15px; background: var(--green); animation: blink 1s step-end infinite; }

  /* COUNTDOWN FIXES */
  .countdown-label { font-size: 0.68rem; letter-spacing: 0.4em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.8rem; opacity: 0; animation: fadein 0.4s 0.9s forwards; }
  .countdown {
    display: flex;
    margin-bottom: 2.5rem;
    border: 1px solid var(--border);
    opacity: 0;
    animation: fadein 0.4s 1s forwards;
  }
  .cd-unit {
    flex: 1;
    padding: 1.2rem 0.5rem 1rem;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .cd-unit:last-child { border-right: none; }
  .cd-num { font-family: var(--display); font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,0.35); line-height: 1; display: block; }
  .cd-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; margin-top: 0.4rem; display: block; }

  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    opacity: 0;
    animation: fadein 0.4s 1.1s forwards;
    padding-bottom: 2rem;
  }
  .domain { font-size: 0.72rem; color: var(--green-dark); letter-spacing: 0.12em; }
  .tagline { font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.08em; }
  .notify-btn {
    font-family: var(--mono); font-size: 0.72rem; color: #000; background: var(--green); padding: 0.5rem 1.2rem; cursor: pointer; text-transform: uppercase; 
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); text-decoration: none; transition: 0.2s;
  }
  .notify-btn:hover { background: #00ff70; box-shadow: 0 0 20px rgba(0,255,65,0.4); }

  /* CORNERS */
  .corner { position: fixed; width: 40px; height: 40px; z-index: 110; pointer-events: none; }
  .corner.tl { top: 20px; left: 20px; }
  .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
  .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
  .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

  @keyframes fadein { to { opacity: 1; } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* MOBILE RESPONSIVENESS */
  @media (max-width: 600px) {
    body { padding-top: 5vh; }
    .countdown { flex-wrap: wrap; }
    .cd-unit { flex: 1 1 45%; border-bottom: 1px solid var(--border); }
    .cd-unit:nth-child(2n) { border-right: none; }
    .cd-unit:nth-last-child(-n+2) { border-bottom: none; }
    .bottom-row { flex-direction: column; gap: 1.5rem; }
    .tagline { display: none; }
  }
</style>
</head>
<body>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00c032;
    --green-glow: rgba(0,255,65,0.18);
    --black: #000000;
    --nav-bg: rgba(3,10,3,0.92);
    --border: rgba(0,255,65,0.22);
    --text-dim: #4d8f55;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Orbitron', sans-serif;
  }

  .ops-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    /* Transition for the slide effect */
    transition: top 0.3s ease-in-out;
  }

  /* Hidden state class */
  .nav-hidden {
    top: -70px; /* Moves it just out of view */
  }

  .nav-logo {
    font-family: var(--display);
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--green);
    letter-spacing: 0.12em;
    text-shadow: 0 0 14px var(--green);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .nav-link {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
    text-transform: uppercase;
  }

  .nav-link:hover {
    color: var(--green);
    text-shadow: 0 0 8px var(--green);
  }

  .nav-btn {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--black);
    background: var(--green);
    padding: 0.45rem 1.1rem;
    border: none;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.2s;
    font-weight: 700;
  }

  .nav-btn:hover {
    background: #00ff70;
    box-shadow: 0 0 20px rgba(0,255,65,0.5);
    transform: translateY(-1px);
  }

  /* Necessary padding so content isn't chopped off at the top */
  body { padding-top: 64px; }

  @media (max-width: 640px) {
    .ops-nav { padding: 0 1.5rem; }
    .nav-link { display: none; }
  }
</style>

<nav class="ops-nav" id="navbar">
  <a href="https://opsbot.link/" class="nav-logo">
    <span style="color: var(--green-dim)">[</span>OPSBOT<span style="color: var(--green-dim)">]</span>
  </a>
  
  <div class="nav-links">
    <a href="https://opsbot.link/" class="nav-link">Home</a>
    <a href="https://opsbot.link/support" class="nav-btn">Support</a>
  </div>
</nav>

<script>
  let lastScrollTop = 0;
  const navbar = document.getElementById("navbar");

  window.addEventListener("scroll", function() {
    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    
    // Check if scrolling down and if we've scrolled past the header height
    if (scrollTop > lastScrollTop && scrollTop > 64) {
      // Scroll Down - Hide Nav
      navbar.classList.add("nav-hidden");
    } else {
      // Scroll Up - Show Nav
      navbar.classList.remove("nav-hidden");
    }
    
    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop; // For Mobile or negative scrolling
  }, false);
</script>

<div class="bg-glow"></div>

<div class="corner tl"><svg viewBox="0 0 40 40" fill="none"><polyline points="40,2 2,2 2,40" stroke="#00ff41" stroke-width="2" stroke-opacity="0.6"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 40 40" fill="none"><polyline points="40,2 2,2 2,40" stroke="#00ff41" stroke-width="2" stroke-opacity="0.6"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 40 40" fill="none"><polyline points="40,2 2,2 2,40" stroke="#00ff41" stroke-width="2" stroke-opacity="0.6"/></svg></div>
<div class="corner br"><svg viewBox="0 0 40 40" fill="none"><polyline points="40,2 2,2 2,40" stroke="#00ff41" stroke-width="2" stroke-opacity="0.6"/></svg></div>

<div class="container">
  <div class="logo">
    <span class="bracket">[</span><span class="ops">OPS</span><span class="bot">BOT</span><span class="bracket">]</span>
  </div>

  <div class="status-chip">
    <span class="status-dot"></span>
    System initializing
  </div>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="t-dot t-r"></div>
      <div class="t-dot t-y"></div>
      <div class="t-dot t-g"></div>
      <span class="terminal-title">OPSBOT — BOOT SEQUENCE</span>
    </div>
    <div class="terminal-body" id="termBody">
      <div class="cursor-line"><span class="prompt">$</span> <span class="cursor"></span></div>
    </div>
  </div>

  <div class="countdown-label">// Estimated deployment</div>
  <div class="countdown">
    <div class="cd-unit"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Days</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Hours</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Minutes</span></div>
    <div class="cd-unit"><span class="cd-num" id="cd-s">00</span><span class="cd-label">Seconds</span></div>
  </div>

  <div class="bottom-row">
    <span class="domain">opsbot.link</span>
    <span class="tagline">The Only Bot Your Division Will Ever Need</span>
    <a href="https://opsbot.link/support" class="notify-btn">Contact Us</a>
  </div>
</div>

<script>
  const lines = [
    { type: 'cmd',  text: 'opsbot --init' },
    { type: 'out',  text: 'Loading core modules...' },
    { type: 'out',  text: 'SEA blacklist sync........... OK', cls: 'green' },
    { type: 'out',  text: 'Division EXP tracker......... OK', cls: 'green' },
    { type: 'out',  text: 'Event host engine............ OK', cls: 'green' },
    { type: 'out',  text: 'Analytics digest............. OK', cls: 'green' },
    { type: 'out',  text: 'Module toggle system......... OK', cls: 'green' },
    { type: 'out',  text: 'Officer quota and warnings... OK', cls: 'green' },
    { type: 'out',  text: 'Moderation and logging....... OK', cls: 'green' },
    { type: 'out',  text: '' },
    { type: 'out',  text: 'WARNING: Deployment pending', cls: 'warn' },
    { type: 'out',  text: 'Standing by for launch...', cls: 'dim' },
  ];

  const body = document.getElementById('termBody');
  let i = 0;

  function addLine() {
    if (i >= lines.length) return;
    const l = lines[i++];
    const div = document.createElement('div');
    div.className = 'line visible';

    if (l.type === 'cmd') {
      div.innerHTML = `<span class="prompt">$</span><span class="cmd"> ${l.text}</span>`;
    } else {
      const cls = l.cls ? ` ${l.cls}` : '';
      div.innerHTML = `<span class="out${cls}">${l.text}</span>`;
    }

    const cursor = body.querySelector('.cursor-line');
    body.insertBefore(div, cursor);
    
    // FIX: Auto-scroll terminal
    body.scrollTop = body.scrollHeight;

    setTimeout(addLine, i === 1 ? 300 : l.text === '' ? 80 : 120);
  }

  setTimeout(addLine, 900);

  const target = new Date('2026-04-25T12:00:00Z');
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    const now = new Date();
    const diff = Math.max(0, target - now);
    const s = Math.floor(diff / 1000) % 60;
    const m = Math.floor(diff / 60000) % 60;
    const h = Math.floor(diff / 3600000) % 24;
    const d = Math.floor(diff / 86400000);
    document.getElementById('cd-d').textContent = pad(d);
    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
