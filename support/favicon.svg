<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#051a05"/>
      <stop offset="100%" stop-color="#010801"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#00ff41" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Grid lines - very subtle -->
  <g stroke="#00ff41" stroke-opacity="0.07" stroke-width="0.4">
    <line x1="0" y1="8"  x2="32" y2="8"/>
    <line x1="0" y1="16" x2="32" y2="16"/>
    <line x1="0" y1="24" x2="32" y2="24"/>
    <line x1="8"  y1="0" x2="8"  y2="32"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <line x1="24" y1="0" x2="24" y2="32"/>
  </g>

  <!-- [O] centered as one text element -->
  <text x="16" y="14"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Orbitron, monospace"
    font-size="16" font-weight="900"
    filter="url(#glow)">
    <tspan fill="#00c032">[</tspan><tspan fill="#00ff41">O</tspan><tspan fill="#00c032">]</tspan>
  </text>

</svg>
